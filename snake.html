<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        h1 {
            color: #0f3460;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #e94560;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            background: #0f3460;
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
        #score {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        #controls {
            margin-top: 20px;
            color: #fff;
            text-align: center;
        }
        #controls p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.8;
        }
        #startBtn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        #gameOver h2 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 15px;
        }
        #gameOver p {
            color: #fff;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 貪吃蛇</h1>
    <div id="score">分數: 0</div>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver">
            <h2>遊戲結束!</h2>
            <p>最終分數: <span id="finalScore">0</span></p>
        </div>
    </div>
    <button id="startBtn">開始遊戲</button>
    <div id="controls">
        <p>使用 ↑ ↓ ← → 或 W A S D 控制移動</p>
        <p>按空白鍵暫停/繼續</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let isPaused = false;
        let isRunning = false;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreEl.textContent = `分數: ${score}`;
            placeFood();
            gameOverEl.style.display = 'none';
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e94560';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#ff6b6b' : '#e94560';
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }

            ctx.fillStyle = '#4ecca3';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = `分數: ${score}`;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            isRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
            startBtn.textContent = '重新開始';
        }

        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            initGame();
            isRunning = true;
            isPaused = false;
            startBtn.textContent = '遊戲中...';
            gameLoop = setInterval(update, 100);
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                startGame();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (isPaused) {
                    isPaused = false;
                    gameLoop = setInterval(update, 100);
                } else {
                    isPaused = true;
                    clearInterval(gameLoop);
                }
                return;
            }

            const key = e.key.toLowerCase();
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((key === 'arrowup' || key === 'w') && !goingDown) {
                dx = 0;
                dy = -1;
            } else if ((key === 'arrowdown' || key === 's') && !goingUp) {
                dx = 0;
                dy = 1;
            } else if ((key === 'arrowleft' || key === 'a') && !goingRight) {
                dx = -1;
                dy = 0;
            } else if ((key === 'arrowright' || key === 'd') && !goingLeft) {
                dx = 1;
                dy = 0;
            }
        });

        draw();
    </script>
</body>
</html>
